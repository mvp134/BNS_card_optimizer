<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도화첩 최적화 | BnS Neo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Rajdhani:wght@500;700&display=swap');

  :root {
    --bg: #0a0b0f;
    --bg2: #111318;
    --bg3: #181c24;
    --border: #2a2f3d;
    --border2: #3a4055;
    --gold: #c8993a;
    --gold2: #e8b84b;
    --red: #c94040;
    --blue: #4a80c4;
    --green: #4caf78;
    --text: #d4d8e8;
    --text2: #8891aa;
    --text3: #5a6070;
    --accent: #7b5ea7;
    --accent2: #9b7ec8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    font-size: 13px;
  }

  header {
    background: linear-gradient(180deg, #12060a 0%, var(--bg2) 100%);
    border-bottom: 1px solid var(--gold);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(200,153,58,0.4);
  }

  .logo span { color: var(--text2); font-size: 14px; font-weight: 500; margin-left: 8px; letter-spacing: 1px; }

  .point-badge {
    margin-left: auto;
    background: linear-gradient(135deg, #1a1200, #2a1e00);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    color: var(--gold2);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .point-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .point-bar {
    width: 120px;
    height: 6px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .point-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    transition: width 0.3s ease;
    border-radius: 3px;
  }
  .point-bar-fill.over { background: linear-gradient(90deg, var(--red), #e05050); }

  .layout {
    display: grid;
    grid-template-columns: 300px 1fr 320px;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* ===== PANELS ===== */
  .panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .panel-body { flex: 1; overflow-y: auto; padding: 12px; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: var(--bg); }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ===== LEFT: BOND LIST ===== */
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    width: 100%;
    outline: none;
    margin-bottom: 8px;
  }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text3); }

  .filter-row {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-size: 11px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: rgba(200,153,58,0.15); border-color: var(--gold); color: var(--gold2); }

  .bond-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 11px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 9px;
    position: relative;
  }
  .bond-item:hover { border-color: var(--border2); background: var(--bg3); }
  .bond-item.selected { border-color: var(--gold); background: rgba(200,153,58,0.08); }
  .bond-item.in-result { border-color: var(--green); background: rgba(76,175,120,0.08); }

  .bond-cost {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  .bond-info { flex: 1; min-width: 0; }
  .bond-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bond-tags { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }

  .tag {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid;
  }
  .tag-crit-pct { color: #ff8c42; border-color: rgba(255,140,66,0.4); background: rgba(255,140,66,0.1); }
  .tag-crit-dmg { color: #e04444; border-color: rgba(224,68,68,0.4); background: rgba(224,68,68,0.1); }
  .tag-crit { color: #c84080; border-color: rgba(200,64,128,0.4); background: rgba(200,64,128,0.1); }
  .tag-hit { color: #5aa8e0; border-color: rgba(90,168,224,0.4); background: rgba(90,168,224,0.1); }
  .tag-hp { color: #58c87e; border-color: rgba(88,200,126,0.4); background: rgba(88,200,126,0.1); }
  .tag-skill { color: var(--accent2); border-color: rgba(155,126,200,0.4); background: rgba(155,126,200,0.1); }
  .tag-other { color: var(--text3); border-color: var(--border); background: transparent; }

  .check-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .bond-item.selected .check-icon {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
    font-size: 10px;
  }
  .bond-item.in-result .check-icon {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    font-size: 10px;
  }

  /* ===== MIDDLE: WEIGHTS ===== */
  .weight-section { margin-bottom: 16px; }
  .section-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .weight-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .weight-label {
    width: 90px;
    font-size: 12px;
    color: var(--text2);
    flex-shrink: 0;
  }

  .weight-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--bg3);
    outline: none;
    cursor: pointer;
  }
  .weight-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 6px rgba(200,153,58,0.5);
  }

  .weight-val {
    width: 36px;
    text-align: right;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--gold2);
  }

  .skill-grid { display: flex; flex-direction: column; gap: 6px; }
  .skill-row {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .skill-name {
    font-size: 12px;
    color: var(--accent2);
    width: 70px;
    flex-shrink: 0;
  }

  .skill-weight-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--bg3);
    outline: none;
    cursor: pointer;
  }
  .skill-weight-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
    border: 2px solid var(--bg);
  }

  .skill-val {
    width: 36px;
    text-align: right;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
  }

  .optimize-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #3d2600, #5c3800);
    border: 1px solid var(--gold);
    border-radius: 8px;
    color: var(--gold2);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 16px;
    box-shadow: 0 0 20px rgba(200,153,58,0.15);
  }
  .optimize-btn:hover {
    background: linear-gradient(135deg, #4d3000, #7a4c00);
    box-shadow: 0 0 30px rgba(200,153,58,0.3);
    transform: translateY(-1px);
  }
  .optimize-btn:active { transform: translateY(0); }

  /* ===== RIGHT: RESULTS ===== */
  .result-panel { border-right: none; }

  .result-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text3);
    font-size: 12px;
    gap: 8px;
  }

  .result-summary {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .result-score {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold2);
    text-align: center;
    text-shadow: 0 0 20px rgba(200,153,58,0.4);
  }

  .result-score-label {
    text-align: center;
    color: var(--text3);
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .stat-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 8px;
  }

  .stat-item {
    background: var(--bg3);
    border-radius: 4px;
    padding: 5px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat-item-name { font-size: 11px; color: var(--text2); }
  .stat-item-val { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
  .stat-item-val.highlight { color: var(--gold2); }

  .result-bond-list { display: flex; flex-direction: column; gap: 6px; }

  .result-bond {
    background: var(--bg2);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .result-bond-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .result-bond-cost {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(76,175,120,0.2);
    border: 1px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
  }

  .result-bond-name { font-size: 12px; font-weight: 500; color: var(--text); }

  .result-bond-effects { display: flex; flex-direction: column; gap: 3px; }
  .result-effect {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-effect-name { color: var(--text3); }
  .result-effect-val { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--text); }
  .result-effect-val.is-skill { color: var(--accent2); font-size: 11px; font-family: 'Noto Sans KR', sans-serif; }

  .no-selection-note {
    background: rgba(200,153,58,0.08);
    border: 1px solid rgba(200,153,58,0.3);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--gold);
    font-size: 11px;
    margin-bottom: 10px;
    text-align: center;
  }

  .count-badge {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: var(--text2);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .notice {
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">도화첩 최적화 <span>BnS NEO</span></div>
  <div class="point-badge">
    <span>점수</span>
    <div class="point-bar-wrap">
      <div class="point-bar"><div class="point-bar-fill" id="pointBarFill" style="width:0%"></div></div>
    </div>
    <span id="pointDisplay">0 / 20</span>
  </div>
</header>

<div class="layout">

  <!-- LEFT: 인연 선택 -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">활성 인연 선택</span>
      <span class="count-badge" id="selectedCount">0 선택</span>
    </div>
    <div class="panel-body">
      <input class="search-box" id="searchBox" placeholder="인연명 / 도화명 검색..." />
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="2">2점</button>
        <button class="filter-btn" data-filter="3">3점</button>
        <button class="filter-btn" data-filter="4">4점</button>
        <button class="filter-btn" data-filter="5">5점</button>
        <button class="filter-btn" data-filter="selected">선택됨</button>
      </div>
      <div id="bondList"></div>
    </div>
  </div>

  <!-- MIDDLE: 가중치 설정 -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">가중치 설정</span>
    </div>
    <div class="panel-body">
      <div class="weight-section">
        <div class="section-label">스탯 가중치</div>
        <div class="weight-row">
          <span class="weight-label">치명 확률%</span>
          <input type="range" class="weight-slider" id="w_crit_pct" min="0" max="200" value="100">
          <span class="weight-val" id="wv_crit_pct">100</span>
        </div>
        <div class="weight-row">
          <span class="weight-label">치명 피해율%</span>
          <input type="range" class="weight-slider" id="w_crit_dmg_pct" min="0" max="200" value="100">
          <span class="weight-val" id="wv_crit_dmg_pct">100</span>
        </div>
        <div class="weight-row">
          <span class="weight-label">치명 피해</span>
          <input type="range" class="weight-slider" id="w_crit_dmg" min="0" max="200" value="40">
          <span class="weight-val" id="wv_crit_dmg">40</span>
        </div>
        <div class="weight-row">
          <span class="weight-label">치명</span>
          <input type="range" class="weight-slider" id="w_crit" min="0" max="200" value="30">
          <span class="weight-val" id="wv_crit">30</span>
        </div>
        <div class="weight-row">
          <span class="weight-label">명중</span>
          <input type="range" class="weight-slider" id="w_hit" min="0" max="200" value="15">
          <span class="weight-val" id="wv_hit">15</span>
        </div>
        <div class="weight-row">
          <span class="weight-label">생명력</span>
          <input type="range" class="weight-slider" id="w_hp" min="0" max="200" value="5">
          <span class="weight-val" id="wv_hp">5</span>
        </div>
      </div>

      <div class="weight-section">
        <div class="section-label">스킬 가중치 (보유 시 보너스)</div>
        <div class="skill-grid" id="skillGrid"></div>
      </div>

      <div class="notice">% 스탯은 0.01 단위로 수치 변환됩니다</div>

      <button class="optimize-btn" id="optimizeBtn">⚡ 최적 조합 계산</button>
    </div>
  </div>

  <!-- RIGHT: 결과 -->
  <div class="panel result-panel">
    <div class="panel-header">
      <span class="panel-title">최적화 결과</span>
      <span id="resultPointBadge" class="count-badge">-</span>
    </div>
    <div class="panel-body" id="resultPanel">
      <div class="result-empty">
        <div>🎯</div>
        <div>인연을 선택하고 최적화를 실행하세요</div>
      </div>
    </div>
  </div>

</div>
